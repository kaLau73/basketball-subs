<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sub Rotation Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#0d1117;color:#e6edf3;font-family:'Syne',sans-serif;min-height:100vh;}
  input[type=text]{background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,0.15);color:#e6edf3;font-family:'Syne',sans-serif;font-size:14px;padding:2px 4px;outline:none;width:100%;}
  input[type=text]:focus{border-bottom-color:#f97316;}
  input[type=number]{background:#0a0400;border:1px solid rgba(200,118,10,0.4);border-radius:6px;color:#e6edf3;font-family:'Syne',sans-serif;font-size:16px;padding:6px 10px;outline:none;width:100%;}
  button{font-family:'Syne',sans-serif;transition:opacity 0.1s,transform 0.1s;cursor:pointer;}
  button:active{opacity:0.75;transform:scale(0.96);}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:#0d1117}
  ::-webkit-scrollbar-thumb{background:#30363d;border-radius:4px}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
  .fade-up{animation:fadeUp 0.35s ease both;}
  .card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:16px 20px;margin-bottom:16px;}
  .section-title{font-size:10px;font-weight:700;letter-spacing:2px;color:#8b949e;text-transform:uppercase;margin-bottom:12px;}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:center;justify-content:center;padding:16px;}
  .modal-overlay.open{display:flex;}
  .modal{background:#161b22;border:1px solid #30363d;border-radius:16px;padding:20px;width:100%;max-width:420px;max-height:80vh;display:flex;flex-direction:column;gap:12px;animation:slideIn 0.2s ease;}
  .player-row{border-radius:10px;overflow:hidden;transition:border-color 0.15s;margin-bottom:8px;}
  .player-row-main{display:flex;align-items:center;gap:8px;padding:8px 10px;}
  .player-row-roles{padding:6px 10px 10px;border-top:1px solid #21262d;display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
  .role-btn{padding:3px 10px;border-radius:10px;border:none;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;cursor:pointer;}
  .icon-btn{background:none;border:none;font-size:14px;padding:0 2px;color:#8b949e;}
  .squad-btn{padding:8px 22px;border-radius:8px;border:none;font-family:'Syne',sans-serif;font-weight:700;font-size:18px;cursor:pointer;transition:background 0.15s,color 0.15s;}
  .call-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:7px 10px;border-radius:8px;}
  .player-tag{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;font-family:'DM Mono',monospace;}
  .legend-chip{display:flex;align-items:center;gap:5px;background:#161b22;border:1px solid #30363d;border-radius:20px;padding:4px 10px;}
  .grid-wrap{background:#161b22;border-radius:10px;border:1px solid #30363d;overflow:hidden;}
  .grid-header-cell{padding:8px 10px;font-size:10px;font-weight:700;letter-spacing:1px;color:#8b949e;text-transform:uppercase;display:flex;align-items:center;border-bottom:1px solid #21262d;}
  .grid-data-cell{padding:7px 8px;border-top:1px solid #21262d;border-left:1px solid #21262d;display:flex;align-items:center;justify-content:center;}
  .grid-name-cell{padding:7px 8px;border-top:1px solid #21262d;display:flex;align-items:center;gap:6px;}
  .dot-badge{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;font-family:'DM Mono',monospace;}
  .warning{display:flex;align-items:center;gap:8px;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:12px;}
  @media print{.no-print{display:none!important}body{background:white!important}}
</style>
</head>
<body>
<div id="app" style="max-width:900px;margin:0 auto;padding:20px 16px;"></div>

<!-- Library Modal -->
<div class="modal-overlay" id="modal-library">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <span style="font-weight:800;font-size:16px;">📚 Player Library</span>
      <button onclick="closeLibrary()" style="background:none;border:none;color:#8b949e;font-size:18px;cursor:pointer;">✕</button>
    </div>
    <input type="text" id="lib-search" placeholder="Search players…" oninput="renderLibraryList()"
      style="background:#0d1117;border:1px solid #30363d;border-radius:8px;color:#e6edf3;font-family:'Syne',sans-serif;font-size:13px;padding:8px 12px;outline:none;width:100%;">
    <div id="lib-list" style="overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:6px;min-height:60px;"></div>
    <button onclick="closeLibrary()" id="lib-close-btn" style="background:#21262d;border:none;border-radius:8px;color:#8b949e;font-weight:700;font-size:13px;padding:8px;cursor:pointer;">Close</button>
  </div>
</div>

<script>
// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const HALF_MINS = 19;
const SLOTS_PER_HALF = 4;
const TOTAL_SLOTS = SLOTS_PER_HALF * 2;
const ON_COURT = 5;
const MAX_ATTEMPTS = 800;

const ROLES = [
  { id:"big",       label:"Big",       color:"#ef4444", icon:"🏋️" },
  { id:"playmaker", label:"Playmaker", color:"#3b82f6", icon:"🎯" },
  { id:"scorer",    label:"Scorer",    color:"#f97316", icon:"🔥" },
  { id:"defender",  label:"Defender",  color:"#22c55e", icon:"🛡️" },
  { id:"shooter",   label:"Shooter",   color:"#a855f7", icon:"🎳" },
];

const PLAYER_COLORS = [
  "#ef4444","#f97316","#eab308","#22c55e","#06b6d4",
  "#3b82f6","#8b5cf6","#ec4899","#14b8a6"
];

// ─── STATE ───────────────────────────────────────────────────────────────────
let state = {
  step: "setup",
  teamName: localStorage.getItem("team-name") || "My Team",
  playerCount: 7,
  roster: Array.from({length:9},(_,i)=>({
    uid:i, id:i, name:`Player ${i+1}`,
    color:PLAYER_COLORS[i], roles:[], forceStart:false, expanded:false
  })),
  rotation: null,
  library: JSON.parse(localStorage.getItem("player-library")||"[]"),
  libMode: null,    // "pick" | "browse"
  libSlot: null,
};

// ─── UTILS ───────────────────────────────────────────────────────────────────
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function slotStartTime(idx){
  const half=idx<SLOTS_PER_HALF?0:1;
  const pos=idx%SLOTS_PER_HALF;
  const totalMin=half*HALF_MINS+(pos*HALF_MINS)/SLOTS_PER_HALF;
  const m=Math.floor(totalMin);
  const s=Math.round((totalMin-m)*60);
  return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}
function slotDuration(){
  const mins=Math.floor(HALF_MINS/SLOTS_PER_HALF);
  const secs=Math.round(((HALF_MINS/SLOTS_PER_HALF)-mins)*60);
  return `${mins}:${String(secs).padStart(2,"0")}`;
}
function esc(str){ // escape HTML
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ─── ROTATION ENGINE ─────────────────────────────────────────────────────────
function buildSlots(order,n){
  const bs=n-ON_COURT;
  return Array.from({length:TOTAL_SLOTS},(_,s)=>{
    const offset=(s*bs)%n;
    return Array.from({length:ON_COURT},(_,i)=>order[(offset+i)%n]);
  });
}
function scoreSlots(slots,enforceableRules,players){
  let v=0;
  for(const rule of enforceableRules){
    const ids=players.filter(p=>p.roles.includes(rule)).map(p=>p.id);
    for(const slot of slots) if(!slot.some(id=>ids.includes(id))) v++;
  }
  return v;
}
function generateRotation(players,forcedStarterIds){
  const n=players.length;
  const minutesPerSlot=HALF_MINS/SLOTS_PER_HALF;
  const enforceableRules=[], ignoredRules=[];
  for(const role of ROLES){
    const count=players.filter(p=>p.roles.includes(role.id)).length;
    if(count===1) ignoredRules.push(role.id);
    else if(count>=2) enforceableRules.push(role.id);
  }
  const forced=players.filter(p=>forcedStarterIds.includes(p.id));
  const others=players.filter(p=>!forcedStarterIds.includes(p.id));
  let bestSlots=null, bestScore=Infinity;
  for(let attempt=0;attempt<MAX_ATTEMPTS;attempt++){
    const order=[...forced,...shuffle(others)].map(p=>p.id);
    const slots=buildSlots(order,n);
    const score=scoreSlots(slots,enforceableRules,players);
    if(score<bestScore){bestScore=score;bestSlots=slots;if(score===0)break;}
  }
  const roleViolations={};
  for(const rule of enforceableRules){
    const ids=players.filter(p=>p.roles.includes(rule)).map(p=>p.id);
    const bads=bestSlots.map((s,i)=>({i,ok:s.some(id=>ids.includes(id))})).filter(x=>!x.ok).map(x=>x.i);
    if(bads.length) roleViolations[rule]=bads;
  }
  const playerMinutes={};
  players.forEach(p=>{
    playerMinutes[p.id]=Math.round(bestSlots.filter(s=>s.includes(p.id)).length*minutesPerSlot*10)/10;
  });
  return{slots:bestSlots,playerMinutes,enforceableRules,ignoredRules,roleViolations};
}

// ─── STORAGE ─────────────────────────────────────────────────────────────────
function saveLibrary(){ localStorage.setItem("player-library",JSON.stringify(state.library)); }
function saveTeamName(){ localStorage.setItem("team-name",state.teamName); }

// ─── RENDER HELPERS ──────────────────────────────────────────────────────────
function rolePillHTML(roleId, small=false){
  const role=ROLES.find(r=>r.id===roleId);
  if(!role) return "";
  const pad=small?"1px 5px":"2px 8px";
  const fs=small?"9px":"10px";
  return `<span style="display:inline-flex;align-items:center;gap:2px;padding:${pad};border-radius:10px;font-size:${fs};font-weight:700;background:${role.color}22;color:${role.color};white-space:nowrap;">${role.icon}${small?"":" "+role.label}</span>`;
}

function activePlayers(){ return state.roster.slice(0, state.playerCount); }
function forcedCount(){ return activePlayers().filter(p=>p.forceStart).length; }
function equalMins(){ return Math.round((TOTAL_SLOTS*ON_COURT/state.playerCount)*(HALF_MINS/SLOTS_PER_HALF)*10)/10; }
function benchSize(){ return state.playerCount - ON_COURT; }

// ─── MAIN RENDER ─────────────────────────────────────────────────────────────
function render(){
  const app = document.getElementById("app");
  app.innerHTML = headerHTML() + (state.step==="setup" ? setupHTML() : rotationHTML());
  attachEvents();
}

function headerHTML(){
  return `
  <div class="fade-up" style="margin-bottom:24px;">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:4px;">
      <div style="width:8px;height:36px;background:linear-gradient(180deg,#f97316,#ef4444);border-radius:4px;flex-shrink:0;"></div>
      <div style="flex:1;">
        <h1 id="team-name-display" onclick="editTeamName()"
          style="font-size:clamp(22px,5vw,30px);font-weight:800;letter-spacing:-0.5px;cursor:text;display:flex;align-items:center;gap:8px;">
          ${esc(state.teamName)} <span style="font-size:13px;color:#484f58;font-weight:400;">✏️</span>
        </h1>
        <p style="font-size:11px;color:#8b949e;margin-top:2px;">
          Sub Rotation · 2 × 19 min · 5 on court · full bench rotates every ${slotDuration()}
        </p>
      </div>
    </div>
  </div>`;
}

function setupHTML(){
  const ap=activePlayers(), fc=forcedCount(), bs=benchSize();
  return `
  <div class="fade-up">
    <!-- Squad size -->
    <div class="card">
      <div class="section-title">Squad Size</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;">
        ${[6,7,8,9].map(n=>`
          <button class="squad-btn" onclick="setPlayerCount(${n})"
            style="background:${state.playerCount===n?"#f97316":"#21262d"};color:${state.playerCount===n?"#fff":"#8b949e"};">${n}</button>
        `).join("")}
      </div>
      <p style="font-size:12px;color:#8b949e;">
        <span style="color:#f97316;font-weight:700;">${bs}</span> bench →
        <span style="color:#f97316;font-weight:700;">${bs}</span> sub${bs!==1?"s":""} every ${slotDuration()} ·
        <span style="color:#f97316;font-weight:700;">${equalMins()} min</span> each
      </p>
    </div>

    <!-- Players -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <div class="section-title" style="margin-bottom:0;">Players · ${fc}/5 forced starters</div>
        <button onclick="openLibraryBrowse()" style="background:#21262d;border:1px solid #30363d;border-radius:6px;padding:4px 10px;color:#8b949e;font-size:11px;font-weight:700;">📚 Library</button>
      </div>
      ${ap.map((p,idx)=>playerRowHTML(p,idx,fc)).join("")}
    </div>

    <button onclick="generate()" style="width:100%;padding:14px;background:linear-gradient(135deg,#f97316,#ef4444);border:none;border-radius:10px;font-weight:800;font-size:16px;letter-spacing:1px;color:#fff;box-shadow:0 4px 20px rgba(249,115,22,0.3);">
      GENERATE ROTATION →
    </button>
  </div>`;
}

function playerRowHTML(p, idx, fc){
  const canForce = p.forceStart || fc < ON_COURT;
  const border = `1px solid ${p.forceStart?"#f97316":"#30363d"}`;
  const bg = p.forceStart?"rgba(249,115,22,0.06)":"#0d1117";
  const rolesSummary = p.roles.map(r=>rolePillHTML(r,true)).join("");
  const rolesPanel = p.expanded ? `
    <div class="player-row-roles">
      <span style="font-size:10px;color:#8b949e;">ROLE:</span>
      ${ROLES.map(role=>{
        const active=p.roles.includes(role.id);
        return `<button class="role-btn" onclick="toggleRole(${p.uid},'${role.id}')"
          style="background:${active?role.color+"33":"#21262d"};color:${active?role.color:"#8b949e"};outline:${active?"1px solid "+role.color:"none"};">
          ${role.icon} ${role.label}</button>`;
      }).join("")}
    </div>` : "";
  return `
  <div class="player-row" style="background:${bg};border:${border};">
    <div class="player-row-main">
      <div style="width:10px;height:10px;border-radius:50%;background:${p.color};flex-shrink:0;"></div>
      <input type="text" value="${esc(p.name)}" oninput="updateName(${p.uid},this.value)" style="flex:1;font-size:14px;font-weight:700;">
      <div style="display:flex;gap:3px;">${rolesSummary}</div>
      <button class="icon-btn" onclick="openLibraryPick(${idx})" title="Pick from library">📚</button>
      <button class="icon-btn" onclick="saveToLibrary(${p.uid})" title="Save to library">💾</button>
      <button class="icon-btn" onclick="toggleForceStart(${p.uid})"
        title="${p.forceStart?"Remove forced start":canForce?"Force start":"Max 5 starters"}"
        style="opacity:${canForce?1:0.25};cursor:${canForce?"pointer":"not-allowed"};">
        ${p.forceStart?"🔒":"🔓"}
      </button>
      <button class="icon-btn" onclick="toggleExpanded(${p.uid})" title="Set roles" style="font-size:12px;color:#484f58;">
        ${p.expanded?"▲":"▼"}
      </button>
    </div>
    ${rolesPanel}
  </div>`;
}

function rotationHTML(){
  const rot = state.rotation;
  const ap = rot.activePlayers;

  // Warnings
  let warningsHTML = "";
  for(const rId of rot.ignoredRules){
    const role=ROLES.find(r=>r.id===rId);
    warningsHTML+=`<div class="warning" style="background:rgba(234,179,8,0.08);border:1px solid rgba(234,179,8,0.3);color:#eab308;">
      ⚠️ <strong>${role.label}</strong>: only 1 player assigned — rule ignored to keep equal sub time.</div>`;
  }
  for(const [rId,bads] of Object.entries(rot.roleViolations)){
    const role=ROLES.find(r=>r.id===rId);
    warningsHTML+=`<div class="warning" style="background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.3);color:#ef4444;">
      ⚠️ <strong>${role.label}</strong>: couldn't guarantee coverage in ${bads.length} slot${bads.length>1?"s":""} — equal time takes priority. Try Randomise Again.</div>`;
  }

  // Legend
  const legendHTML = ap.map(p=>`
    <div class="legend-chip">
      <div style="width:8px;height:8px;border-radius:50%;background:${p.color};"></div>
      <span style="font-size:12px;font-family:'DM Mono',monospace;">${esc(p.name)}</span>
      <span style="font-size:11px;color:#f97316;font-weight:700;font-family:'DM Mono',monospace;">${rot.playerMinutes[p.id]}m</span>
      ${p.roles.map(r=>rolePillHTML(r,true)).join("")}
      ${p.forceStart?"<span style='font-size:9px;'>🔒</span>":""}
    </div>`).join("");

  // Grids
  let gridsHTML = "";
  for(let half=0;half<2;half++){
    const colTemplate = `90px repeat(${SLOTS_PER_HALF},1fr)`;
    let gridRows = `
      <div style="display:grid;grid-template-columns:${colTemplate};" class="grid-wrap">
        <div class="grid-header-cell">Player</div>
        ${Array.from({length:SLOTS_PER_HALF},(_,si)=>{
          const idx=half*SLOTS_PER_HALF+si;
          return `<div class="grid-header-cell" style="border-left:1px solid #21262d;flex-direction:column;align-items:center;justify-content:center;gap:1px;">
            <span style="font-size:11px;font-family:'DM Mono',monospace;color:#f97316;font-weight:700;">${slotStartTime(idx)}</span>
            <span style="font-size:9px;color:#484f58;font-family:'DM Mono',monospace;">${slotDuration()}</span>
          </div>`;
        }).join("")}
        ${ap.map(p=>{
          const nameCellStyle = `${p.forceStart?'background:rgba(249,115,22,0.04);':''}`;
          const slotCells = Array.from({length:SLOTS_PER_HALF},(_,si)=>{
            const idx=half*SLOTS_PER_HALF+si;
            const on=rot.slots[idx].includes(p.id);
            const violated=!on&&Object.entries(rot.roleViolations).some(([rId,bads])=>bads.includes(idx)&&p.roles.includes(rId));
            const dotBg = on ? p.color : violated?"rgba(239,68,68,0.15)":"#21262d";
            const dotBorder = violated?"1px solid rgba(239,68,68,0.5)":"none";
            const dotContent = on
              ? `<div class="dot-badge" style="background:${p.color};box-shadow:0 2px 8px ${p.color}55;">${esc(p.name.slice(0,2).toUpperCase())}</div>`
              : `<div style="width:30px;height:30px;border-radius:50%;background:${dotBg};border:${dotBorder};display:flex;align-items:center;justify-content:center;font-size:12px;color:#484f58;">–</div>`;
            return `<div class="grid-data-cell" style="background:${on?p.color+"1a":"transparent"};">${dotContent}</div>`;
          }).join("");
          return `
            <div class="grid-name-cell" style="${nameCellStyle}">
              <div style="width:8px;height:8px;border-radius:50%;background:${p.color};flex-shrink:0;"></div>
              <span style="font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;">${esc(p.name)}</span>
              ${p.forceStart?"<span style='font-size:9px;'>🔒</span>":""}
            </div>
            ${slotCells}`;
        }).join("")}
      </div>`;

    gridsHTML += `
      <div style="margin-bottom:18px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
          <div style="background:${half===0?"#1f6feb":"#388bfd"};border-radius:6px;padding:2px 10px;font-size:11px;font-weight:700;letter-spacing:2px;color:#fff;">
            Half ${half+1}
          </div>
          <div style="height:1px;flex:1;background:#21262d;"></div>
        </div>
        ${gridRows}
      </div>`;
  }

  // Sub call sheet
  let callsHTML = "";
  for(let si=0;si<TOTAL_SLOTS;si++){
    const slot=rot.slots[si];
    const isNewHalf=si===SLOTS_PER_HALF;
    const prev=si===0?null:rot.slots[si-1];
    const comingOn=prev?slot.filter(id=>!prev.includes(id)):[];
    const goingOff=prev?prev.filter(id=>!slot.includes(id)):[];
    const bg=si===0?"rgba(249,115,22,0.08)":isNewHalf?"rgba(56,139,253,0.08)":"#0d1117";
    const border=si===0?"1px solid rgba(249,115,22,0.3)":isNewHalf?"1px solid #1f6feb":"1px solid #21262d";

    let inner = `<span style="font-size:12px;font-family:'DM Mono',monospace;color:#f97316;font-weight:600;min-width:38px;">${slotStartTime(si)}</span>`;
    if(si===0) inner+=`<span style="font-size:10px;font-weight:700;color:#f97316;">TIPOFF</span>`;
    if(isNewHalf) inner+=`<span style="font-size:10px;font-weight:700;color:#388bfd;">HALF 2</span>`;

    if(si===0){
      inner += slot.map(id=>{
        const p=ap.find(p=>p.id===id);
        return p?`<span class="player-tag" style="background:${p.color}2a;color:${p.color};">${esc(p.name)}</span>`:"";
      }).join("");
    } else if(comingOn.length>0){
      inner+=`<span style="font-size:10px;font-weight:700;color:#3fb950;">ON</span>`;
      inner+=comingOn.map(id=>{const p=ap.find(p=>p.id===id);return p?`<span class="player-tag" style="background:${p.color}2a;color:${p.color};">${esc(p.name)}</span>`:""}).join("");
      inner+=`<span style="font-size:10px;font-weight:700;color:#f85149;">OFF</span>`;
      inner+=goingOff.map(id=>{const p=ap.find(p=>p.id===id);return p?`<span class="player-tag" style="background:rgba(248,81,73,0.1);color:#f85149;">${esc(p.name)}</span>`:""}).join("");
    }

    callsHTML+=`<div class="call-row" style="background:${bg};border:${border};">${inner}</div>`;
  }

  return `
  <div class="fade-up">
    <div class="no-print" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;">
      <button onclick="goSetup()" style="padding:8px 16px;background:#21262d;border:1px solid #30363d;border-radius:8px;color:#8b949e;font-weight:700;font-size:13px;">← Back</button>
      <button onclick="regenerate()" style="padding:8px 16px;background:#21262d;border:1px solid #30363d;border-radius:8px;color:#e6edf3;font-weight:700;font-size:13px;">🔀 Randomise Again</button>
      <button onclick="window.print()" style="padding:8px 16px;background:linear-gradient(135deg,#f97316,#ef4444);border:none;border-radius:8px;color:#fff;font-weight:700;font-size:13px;margin-left:auto;">🖨 Print</button>
    </div>
    ${warningsHTML}
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;">${legendHTML}</div>
    ${gridsHTML}
    <div class="card">
      <div class="section-title">Sub Call Sheet</div>
      <div style="display:grid;gap:5px;">${callsHTML}</div>
    </div>
  </div>`;
}

// ─── EVENT HANDLERS ───────────────────────────────────────────────────────────
function attachEvents(){}  // events use inline onclick

function editTeamName(){
  const current = state.teamName;
  const el = document.getElementById("team-name-display");
  el.innerHTML = `<input type="text" id="team-name-input" value="${esc(current)}"
    style="font-size:clamp(22px,5vw,30px);font-weight:800;letter-spacing:-0.5px;color:#f97316;max-width:380px;"
    onblur="commitTeamName()" onkeydown="if(event.key==='Enter')commitTeamName();if(event.key==='Escape')render();">`;
  setTimeout(()=>{const i=document.getElementById("team-name-input");if(i){i.focus();i.select();}},50);
}
function commitTeamName(){
  const i=document.getElementById("team-name-input");
  if(i){ state.teamName=(i.value.trim()||"My Team"); saveTeamName(); }
  render();
}

function setPlayerCount(n){
  state.playerCount=n;
  state.roster=state.roster.map((p,i)=>i>=n?{...p,forceStart:false}:p);
  render();
}

function updateName(uid,name){
  state.roster=state.roster.map(p=>p.uid===uid?{...p,name}:p);
  // don't re-render to avoid losing focus
}

function toggleRole(uid,roleId){
  state.roster=state.roster.map(p=>{
    if(p.uid!==uid) return p;
    const roles=p.roles.includes(roleId)?p.roles.filter(r=>r!==roleId):[...p.roles,roleId];
    return{...p,roles};
  });
  render();
}

function toggleForceStart(uid){
  const p=state.roster.find(p=>p.uid===uid);
  if(!p.forceStart && forcedCount()>=ON_COURT) return;
  state.roster=state.roster.map(pl=>pl.uid===uid?{...pl,forceStart:!pl.forceStart}:pl);
  render();
}

function toggleExpanded(uid){
  state.roster=state.roster.map(p=>p.uid===uid?{...p,expanded:!p.expanded}:p);
  render();
}

function generate(){
  const active=state.roster.slice(0,state.playerCount).map((p,i)=>({...p,id:i}));
  const starters=active.filter(p=>p.forceStart).map(p=>p.id);
  const result=generateRotation(active,starters);
  state.rotation={...result,activePlayers:active};
  state.step="rotation";
  render();
}
function regenerate(){
  const active=state.rotation.activePlayers.map((p,i)=>({...p,id:i}));
  const starters=active.filter(p=>p.forceStart).map(p=>p.id);
  const result=generateRotation(active,starters);
  state.rotation={...result,activePlayers:active};
  render();
}
function goSetup(){ state.step="setup"; render(); }

// ─── LIBRARY ─────────────────────────────────────────────────────────────────
function openLibraryPick(slotIdx){
  state.libMode="pick";
  state.libSlot=slotIdx;
  document.getElementById("lib-search").value="";
  document.getElementById("lib-close-btn").textContent="Cancel";
  document.getElementById("modal-library").classList.add("open");
  renderLibraryList();
}
function openLibraryBrowse(){
  state.libMode="browse";
  state.libSlot=null;
  document.getElementById("lib-search").value="";
  document.getElementById("lib-close-btn").textContent="Close";
  document.getElementById("modal-library").classList.add("open");
  renderLibraryList();
}
function closeLibrary(){
  document.getElementById("modal-library").classList.remove("open");
}
function renderLibraryList(){
  const search=document.getElementById("lib-search").value.toLowerCase();
  const filtered=state.library.filter(l=>l.name.toLowerCase().includes(search));
  const list=document.getElementById("lib-list");
  if(filtered.length===0){
    list.innerHTML=`<p style="font-size:12px;color:#484f58;text-align:center;margin-top:20px;">No saved players yet.<br>Use 💾 on any player row to save them here.</p>`;
    return;
  }
  list.innerHTML=filtered.map(lp=>`
    <div style="display:flex;align-items:center;gap:8px;background:#21262d;border:1px solid #30363d;border-radius:8px;padding:8px 12px;">
      <span style="flex:1;font-size:14px;font-weight:700;color:#e6edf3;">${esc(lp.name)}</span>
      <div style="display:flex;gap:3px;flex-wrap:wrap;">${(lp.roles||[]).map(r=>rolePillHTML(r,true)).join("")}</div>
      ${state.libMode==="pick"?`<button onclick="pickFromLibrary('${esc(lp.name)}')" style="background:#f97316;border:none;border-radius:6px;color:#fff;font-size:11px;font-weight:700;padding:4px 10px;">Pick</button>`:""}
      <button onclick="deleteFromLibrary('${esc(lp.name)}')" title="Delete" style="background:none;border:none;color:#484f58;font-size:14px;cursor:pointer;padding:0 2px;">🗑️</button>
    </div>`).join("");
}

function pickFromLibrary(name){
  const lp=state.library.find(l=>l.name===name);
  if(!lp) return;
  const idx=state.libSlot;
  const p=state.roster[idx];
  state.roster=state.roster.map(pl=>pl.uid===p.uid?{...pl,name:lp.name,roles:lp.roles||[]}:pl);
  closeLibrary();
  render();
}

function saveToLibrary(uid){
  const p=state.roster.find(p=>p.uid===uid);
  if(!p?.name.trim()) return;
  const existing=state.library.some(l=>l.name.toLowerCase()===p.name.toLowerCase());
  if(existing){
    state.library=state.library.map(l=>l.name.toLowerCase()===p.name.toLowerCase()?{...l,roles:p.roles}:l);
  } else {
    state.library=[...state.library,{name:p.name,roles:p.roles}];
  }
  saveLibrary();
  // Brief flash feedback
  const btn=document.querySelector(`button[onclick="saveToLibrary(${uid})"]`);
  if(btn){btn.textContent="✅";setTimeout(()=>{btn.textContent="💾";},800);}
  if(document.getElementById("modal-library").classList.contains("open")) renderLibraryList();
}

function deleteFromLibrary(name){
  state.library=state.library.filter(l=>l.name!==name);
  saveLibrary();
  renderLibraryList();
}

// ─── INIT ────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
